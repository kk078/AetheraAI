name: Deploy to Cloudflare

# The Worker now serves BOTH the API (/api/*) and the static React UI
# (Workers Static Assets, from ui/dist), so a single deploy ships the whole app
# to ai.aetherahealthcare.com behind one Cloudflare Access login.
#
# Triggers:
#   - Manual "Run workflow" button.
#   - Push to main or the active feature branch (paths: worker/**, ui/**, this file).
#
# Required repo secrets (Settings > Secrets and variables > Actions):
#   CLOUDFLARE_API_TOKEN  (Workers Scripts edit, D1 edit, Account read)
#   CLOUDFLARE_ACCOUNT_ID
# Worker runtime secrets (OLLAMA_API_KEY, API_KEYS) are set once in the Cloudflare
# dashboard (Workers & Pages > aethera-ai > Settings > Variables and Secrets) or
# via `wrangler secret put`.

on:
  workflow_dispatch:
  push:
    branches: [main, "claude/add-claude-documentation-AXi7P"]
    paths:
      - "worker/**"
      - "ui/**"
      - ".github/workflows/deploy-cloudflare.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build the React UI; the Worker serves it as static assets.
      - name: Build UI
        working-directory: ui
        run: |
          npm install
          npm run build
        env:
          VITE_API_URL: https://ai.aetherahealthcare.com
          VITE_WS_URL: wss://ai.aetherahealthcare.com/api/voice/stream

      - name: Install worker deps
        working-directory: worker
        run: npm install

      # Verify the TypeScript port before shipping — fails the run on errors.
      - name: Typecheck
        working-directory: worker
        run: npm run typecheck

      - name: Test
        working-directory: worker
        run: npm test

      # Deploys the Worker + the UI (ui/dist) as static assets in one step.
      - name: Deploy Worker
        working-directory: worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
