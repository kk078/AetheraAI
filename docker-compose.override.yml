# =============================================================================
# AETHERA AI — Docker Compose Override: NVIDIA MX450 GPU Passthrough
# =============================================================================
# This file is automatically merged with docker-compose.yml by Docker Compose.
# It enables GPU acceleration for the Ollama container on WSL2 + NVIDIA.
#
# Prerequisites:
#   1. NVIDIA driver 552.84+ installed on Windows
#      → https://www.nvidia.com/drivers
#   2. Docker Desktop with WSL2 backend enabled
#      → Settings > General > Use the WSL 2 based engine
#   3. NVIDIA Container Toolkit installed in Docker Desktop
#      → Settings > WSL Integration > Enable NVIDIA GPU
#   4. Verify GPU access from WSL2:
#      → Open PowerShell: wsl -e nvidia-smi
#      → Should show your MX450 and driver version
#   5. Verify Docker GPU passthrough:
#      → docker run --rm --gpus all nvidia/cuda:12.4.1-base-ubuntu22.04 nvidia-smi
#
# GPU allocation strategy for MX450 (2GB VRAM):
#   - qwen3.5:4b  → GPU (~2.5GB VRAM with offloading, primary local model)
#   - gemma4:e2b  → GPU (~1.5GB VRAM, tool calling)
#   - Only ONE GPU model loaded at a time; Ollama swaps automatically
#   - qwen3.5:9b  → CPU only (5.5GB RAM)
#   - nomic-embed-text → CPU only (~300MB RAM)
# =============================================================================

services:
  ollama:
    environment:
      # Expose all NVIDIA GPUs to the container
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      # Ollama uses these to decide GPU vs CPU placement
      OLLAMA_NUM_GPU: "1"
      # Keep model loaded for 5 min after last request (saves reload time)
      OLLAMA_KEEP_ALIVE: "5m"
      # Max 2 concurrent model loads (GPU can only hold 1 at a time anyway)
      OLLAMA_MAX_LOADED_MODELS: "2"
      # Flash attention for faster inference on small VRAM
      OLLAMA_FLASH_ATTENTION: "1"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities:
                - gpu
                - compute
                - utility

# =============================================================================
# TROUBLESHOOTING
# =============================================================================
# Problem: "could not select device driver" or "nvidia-container-cli not found"
# Fix:    Install NVIDIA Container Toolkit:
#         → Docker Desktop > Settings > WSL Integration > Enable GPU support
#
# Problem: nvidia-smi works in WSL but not in Docker
# Fix:    Restart Docker Desktop after driver updates:
#         → Right-click system tray > Restart
#
# Problem: OOM (out of memory) when loading GPU models
# Fix:    Reduce OLLAMA_NUM_GPU or set to "0" to force CPU mode:
#         OLLAMA_NUM_GPU: "0"
#         This removes GPU acceleration but prevents VRAM crashes.
#
# Problem: MX450 not detected
# Fix:    Verify in Windows Device Manager > Display adapters > NVIDIA MX450
#         Update driver: https://www.nvidia.com/drivers
#         Ensure WSL2 GPU passthrough: wsl --update
# =============================================================================