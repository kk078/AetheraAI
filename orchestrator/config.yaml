# =============================================================================
# ROUTING CONFIGURATION
# =============================================================================
routing:
  # Confidence threshold for multi-agent escalation
  multi_agent_threshold: 0.7

  # Default specialist if none matched
  default_specialist: "general"

  # Enable PHI/PII detection (force local routing)
  phi_detection_enabled: true

  # Enable usage-based routing with rate limit tracking
  usage_based_routing: true

  # Rate limit tracking (Redis-backed)
  rate_limits:
    ollama_cloud:
      session_limit: 100  # Requests per 5-hour session
      weekly_limit: 500   # Requests per week
    huggingface:
      daily_limit: 1000   # Requests per day

# =============================================================================
# MULTI-AGENT CONFIGURATION
# =============================================================================
multi_agent:
  enabled: true
  max_agents: 3
  debate_rounds: 2
  aggregation_method: "consensus"  # Options: consensus, majority, weighted

# =============================================================================
# TEMPORAL ENGINE CONFIGURATION
# =============================================================================
temporal:
  enabled: true
  default_deadline: "7d"
  escalation_threshold: "24h"
  check_interval: "1h"

# =============================================================================
# CONFIDENCE SCORING CONFIGURATION
# =============================================================================
confidence:
  enabled: true
  thresholds:
    high: 0.8    # Green badge
    medium: 0.5  # Yellow badge
    low: 0.0     # Red badge

# =============================================================================
# AUDIT LOGGING CONFIGURATION
# =============================================================================
audit:
  enabled: true
  log_level: "INFO"
  retention_days: 2555  # 7 years for HIPAA
  export_format: "JSON"

# =============================================================================
# MEMORY CONFIGURATION
# =============================================================================
memory:
  vector_store:
    enabled: true
    collection: "healthcare_knowledge"
    top_k: 5
    similarity_threshold: 0.7

  conversation_store:
    enabled: true
    max_history: 100

  user_profile:
    enabled: true
    encryption: true

  knowledge_graph:
    enabled: true
    auto_extract_entities: true
